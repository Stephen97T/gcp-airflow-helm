# Defaults
namespace:
  create: true
  name: "default"

# Configuration for the Airflow instance that needs access
airflow:
  namespace: "airflow"                        # The namespace where Airflow is installed
  schedulerServiceAccount: "airflow-scheduler" # Airflow 3.x: Scheduler manages pods
  workerServiceAccount: "airflow-worker"      # Airflow 2.x: Worker service account (backward compatibility)

